version: "2"

run:
  timeout: 5m

linters:
  default: all
  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
  exclusions:
    paths:
      - bin

formatters:
  enable:
    - gofumpt
    - goimports
    - golines
  settings:
    golines:
      max-len: 100
      tab-len: 2
      shorten-comments: true
      reformat-tags: true
      chain-split-dots: true
